<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - JobPortal</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f6f9; color: #2c3e50; }
        header { background: #1a73e8; color: white; padding: 15px; }
        main { max-width: 700px; margin: 30px auto; padding: 20px; }
        .card { background: white; padding: 18px; margin: 12px 0; border-radius: 6px; }
        .card h3 { color: #1a73e8; }
    </style>
</head>
<body>
    <header><h1>Dashboard</h1><p>Welcome back, User</p></header>
    <main>
        <div class="card"><h3>My Applications</h3><p>Frontend Developer - Pending</p></div>
        <div class="card"><h3>Saved Jobs</h3><p>3 jobs saved</p></div>
        <div class="card"><h3>Profile Views</h3><p>12 views this week</p></div>
    </main>
</body>
</html>
