<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Settings - JobPortal</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f6f9; color: #2c3e50; }
        header { background: #1a73e8; color: white; padding: 15px; }
        main { max-width: 500px; margin: 30px auto; padding: 20px; background: white; border-radius: 8px; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 25px; background: #1a73e8; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <header><h1>Settings</h1></header>
    <main>
        <label>Full Name</label><input type="text" value="John Doe">
        <label>Email</label><input type="email" value="john@example.com">
        <label>New Password</label><input type="password">
        <button>Save Changes</button>
    </main>
</body>
</html>
