<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employee Portal - JobPortal</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; }
        .header { background: #16213e; padding: 15px; text-align: center; }
        .login-box { max-width: 400px; margin: 80px auto; padding: 30px; background: #0f3460; border-radius: 8px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #333; border-radius: 4px; background: #1a1a2e; color: #e0e0e0; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #238636; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
    <div class="header"><h1>Employee Portal</h1></div>
    <div class="login-box">
        <input type="text" placeholder="Employee ID">
        <input type="password" placeholder="Password">
        <button>Access Portal</button>
    </div>
</body>
</html>
