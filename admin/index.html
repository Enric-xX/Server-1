<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - JobPortal</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; }
        header { background: #16213e; padding: 15px; text-align: center; }
        main { max-width: 400px; margin: 80px auto; padding: 30px; background: #0f3460; border-radius: 8px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #333; border-radius: 4px; background: #1a1a2e; color: #e0e0e0; }
        button { width: 100%; padding: 12px; background: #e94560; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .error { color: #e94560; text-align: center; display: none; margin-top: 10px; }
    </style>
</head>
<body>
    <header><h1>Admin Panel</h1></header>
    <main>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="login()">Access Panel</button>
        <p class="error" id="error">Wrong credentials. Try again.</p>
    </main>

    <script>
        function login() {
            var u = document.getElementById("user").value;
            var p = document.getElementById("pass").value;
            if (u === "admin" && p === "J0bP0rt4l_2026!") {
                window.location.href = "/Server-1/admin/panel.html";
            } else {
                document.getElementById("error").style.display = "block";
            }
        }
    </script>
</body>
</html>
