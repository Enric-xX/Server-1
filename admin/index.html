<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - JobPortal</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; }
        header { background: #16213e; padding: 15px; text-align: center; }
        main { max-width: 400px; margin: 80px auto; padding: 30px; background: #0f3460; border-radius: 8px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #333; border-radius: 4px; background: #1a1a2e; color: #e0e0e0; }
        button { width: 100%; padding: 12px; background: #e94560; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
    <header><h1>Admin Panel</h1></header>
    <main>
        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">
        <button>Access Panel</button>
    </main>
</body>
</html>
