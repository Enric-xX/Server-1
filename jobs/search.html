<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Jobs - JobPortal</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f6f9; color: #2c3e50; }
        header { background: #1a73e8; color: white; padding: 15px; text-align: center; }
        main { max-width: 600px; margin: 30px auto; padding: 20px; }
        input[type="text"] { width: 70%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background: #1a73e8; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <header><h1>Search Jobs</h1></header>
    <main>
        <input type="text" placeholder="Search jobs..." id="search">
        <button onclick="alert('Searching...')">Search</button>
        <p><small>Try searching for: developer, designer, remote</small></p>
    </main>
</body>
</html>
