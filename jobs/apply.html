<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Apply - JobPortal</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f6f9; color: #2c3e50; }
        header { background: #1a73e8; color: white; padding: 15px; text-align: center; }
        main { max-width: 500px; margin: 30px auto; padding: 20px; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 12px 30px; background: #1a73e8; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <header><h1>Apply for Job</h1></header>
    <main>
        <input type="text" placeholder="Full Name">
        <input type="email" placeholder="Email">
        <input type="file">
        <button>Submit Application</button>
    </main>
</body>
</html>
